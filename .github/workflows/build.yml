name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 11.5.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm build
      - run: pnpm audit --prod
      - name: Rust format
        working-directory: src-tauri
        run: cargo fmt --check
      - name: Rust lint
        working-directory: src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Rust tests
        working-directory: src-tauri
        run: cargo test

  rust-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: src-tauri

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0

  build-windows:
    if: github.event_name != 'pull_request'
    needs: [test, rust-audit]
    runs-on: windows-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    env:
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      TAURI_SIGNING_CONFIG: ""
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 11.5.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
      - run: pnpm install --frozen-lockfile

      - name: Configure release signing
        shell: pwsh
        run: |
          $bundle = @{}
          if ($env:WINDOWS_CERTIFICATE) {
            $certificatePath = Join-Path $env:RUNNER_TEMP 'rsdownit-signing.pfx'
            [IO.File]::WriteAllBytes($certificatePath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
            $password = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
            $certificate = Import-PfxCertificate -FilePath $certificatePath -CertStoreLocation Cert:\CurrentUser\My -Password $password
            $bundle.windows = @{
              certificateThumbprint = $certificate.Thumbprint
              digestAlgorithm = 'sha256'
              timestampUrl = 'http://timestamp.digicert.com'
            }
          }
          if ($env:TAURI_SIGNING_PRIVATE_KEY) {
            $bundle.createUpdaterArtifacts = $true
          }
          if ($bundle.Count -eq 0) { exit 0 }
          $config = @{ bundle = $bundle }
          $configPath = Join-Path $env:RUNNER_TEMP 'tauri-signing.conf.json'
          $config | ConvertTo-Json -Depth 5 | Set-Content -Path $configPath -Encoding utf8
          "TAURI_SIGNING_CONFIG=$configPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build desktop app
        if: env.TAURI_SIGNING_CONFIG == ''
        run: pnpm tauri build

      - name: Build desktop app with release config
        if: env.TAURI_SIGNING_CONFIG != ''
        run: pnpm tauri build --config "$env:TAURI_SIGNING_CONFIG"

      - name: Collect artifacts and SHA-256 manifest
        shell: pwsh
        run: |
          $artifactDir = Join-Path $env:GITHUB_WORKSPACE 'artifacts'
          New-Item -ItemType Directory -Path $artifactDir -Force | Out-Null
          $files = @(
            Get-Item 'src-tauri/target/release/rsdownit.exe' -ErrorAction SilentlyContinue
            Get-ChildItem 'src-tauri/target/release/bundle/nsis' -Filter '*.exe' -File -ErrorAction SilentlyContinue
            Get-ChildItem 'src-tauri/target/release/bundle/nsis' -Filter '*.exe.sig' -File -ErrorAction SilentlyContinue
            Get-ChildItem 'src-tauri/target/release/bundle/msi' -Filter '*.msi' -File -ErrorAction SilentlyContinue
          )
          if ($files.Count -eq 0) { throw 'No Windows release files were produced.' }
          foreach ($file in $files) { Copy-Item -LiteralPath $file.FullName -Destination $artifactDir }
          $lines = Get-ChildItem $artifactDir -File | Sort-Object Name | ForEach-Object {
            $digest = (Get-FileHash -LiteralPath $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$digest *$($_.Name)"
          }
          $lines | Set-Content -Path (Join-Path $artifactDir 'SHA256SUMS.txt') -Encoding ascii

      - name: Create updater manifest
        if: startsWith(github.ref, 'refs/tags/v') && env.TAURI_SIGNING_PRIVATE_KEY != ''
        shell: pwsh
        run: |
          $package = Get-Content package.json -Raw | ConvertFrom-Json
          if ($env:GITHUB_REF_NAME -ne "v$($package.version)") {
            throw "Release tag must match package version v$($package.version)."
          }
          $installer = Get-ChildItem artifacts -Filter '*-setup.exe' -File | Select-Object -First 1
          if (-not $installer) { throw 'The signed updater installer was not produced.' }
          $signaturePath = "$($installer.FullName).sig"
          if (-not (Test-Path -LiteralPath $signaturePath)) { throw 'The updater signature was not produced.' }
          $owner = $env:GITHUB_REPOSITORY
          $tag = $env:GITHUB_REF_NAME
          $encodedName = [Uri]::EscapeDataString($installer.Name)
          $url = "https://github.com/$owner/releases/download/$tag/$encodedName"
          $manifest = @{
            version = $package.version
            notes = "See the GitHub release notes for $tag."
            pub_date = (Get-Date).ToUniversalTime().ToString('o')
            platforms = @{
              'windows-x86_64' = @{
                signature = (Get-Content -LiteralPath $signaturePath -Raw).Trim()
                url = $url
              }
            }
          }
          $manifest | ConvertTo-Json -Depth 6 | Set-Content artifacts/latest.json -Encoding utf8
          $lines = Get-ChildItem artifacts -File | Where-Object Name -ne 'SHA256SUMS.txt' | Sort-Object Name | ForEach-Object {
            $digest = (Get-FileHash -LiteralPath $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$digest *$($_.Name)"
          }
          $lines | Set-Content artifacts/SHA256SUMS.txt -Encoding ascii

      - name: Attest release files
        uses: actions/attest@36051bcae73b7c2a8a6945a48cbf80953c6baa35 # v4
        with:
          subject-path: artifacts/*

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rsdownit-windows-${{ github.sha }}
          path: artifacts/*
          if-no-files-found: error

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $assets = Get-ChildItem artifacts -File | ForEach-Object FullName
          gh release view $tag 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $assets --clobber
          } else {
            gh release create $tag $assets --verify-tag --generate-notes --title "rsdownit $tag"
          }
